<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Solve-for-X SRE Visual QA Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0A0F;
            --surface-color: #12121E;
            --accent-pink: #FF007F;
            --accent-cyan: #00DDFF;
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --pass-color: #00FF66;
            --fail-color: #FF0055;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', system-ui, sans-serif;
            margin: 0;
            padding: 40px;
        }
        .header {
            border-bottom: 2px solid var(--accent-pink);
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.1);
        }
        .title-box .app-name {
            font-size: 14px;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .title-box .title {
            color: #FFF;
            font-size: 32px;
            font-weight: 800;
            margin-top: 5px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .meta-text {
            color: var(--text-muted);
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        .verdict-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid;
        }
        .verdict-header.pass {
            color: var(--pass-color);
            border-color: rgba(0, 255, 102, 0.3);
            background: rgba(0, 255, 102, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);
        }
        .verdict-header.fail {
            color: var(--fail-color);
            border-color: rgba(255, 0, 85, 0.3);
            background: rgba(255, 0, 85, 0.05);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.1);
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 221, 255, 0.2);
        }
        .card-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }
        .card-value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 10px;
            color: #FFF;
        }
        .card-value.pass { color: var(--pass-color); }
        .card-value.fail { color: var(--fail-color); }

        /* Carousel Navigation Tabs */
        .carousel-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            overflow-x: auto;
        }
        .tab-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #FFF;
        }
        .tab-btn.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            color: #FFF;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        /* Side-by-Side Images layout */
        .image-deck {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .img-panel {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .img-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            margin-bottom: 16px;
            text-align: center;
            text-transform: uppercase;
        }
        .image-frame {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            background: #000;
        }
        .image-frame img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }
        .image-frame:hover img {
            transform: scale(1.02);
        }
        
        .no-data-msg {
            color: var(--text-muted);
            padding: 40px;
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-box">
            <div class="app-name">SFX Memento Mori (sfx_memento_mori)</div>
            <div class="title">⚡ SRE Autonomous Visual QA Report</div>
            <p class="meta-text">검증 완료 일시: 2026-05-23 17:10:16</p>
        </div>
        <div class="verdict-header pass">
            OVERALL PASS ✅
        </div>
    </div>

    <div class="metrics">
        <div class="card">
            <div class="card-label">최대 오차율</div>
            <div class="card-value pass">0.0%</div>
        </div>
        <div class="card">
            <div class="card-label">허용 임계값</div>
            <div class="card-value">1.5%</div>
        </div>
        <div class="card">
            <div class="card-label">검증 경로 수</div>
            <div class="card-value">1</div>
        </div>
    </div>

    <!-- Carousel Tabs -->
    <div class="carousel-tabs" id="tabContainer"></div>

    <!-- Carousel Slides Container -->
    <div id="deckContainer"></div>

    <script>
        const routesData = [{"route": "/", "filename": "sfx_memento_mori_home.png", "baseline_image": "/Users/apple/development/soluni/Solve-for-X/docs/images/sfx_real_memento_mori.png", "current_image": "/Users/apple/development/soluni/Solve-for-X/docs/images/sfx_memento_mori_home.png", "diff_image": "/Users/apple/development/soluni/Solve-for-X/scripts/unicorn_factory/reports/diff_sfx_real_memento_mori_vs_sfx_memento_mori_home.png", "pixel_difference_ratio": 0.0, "deviating_pixels": 0, "total_pixels": 1024000, "passed": true, "status": "SUCCESS"}];

        function renderDashboard() {
            const tabContainer = document.getElementById("tabContainer");
            const deckContainer = document.getElementById("deckContainer");
            
            tabContainer.innerHTML = "";
            deckContainer.innerHTML = "";

            if (!routesData || routesData.length === 0) {
                deckContainer.innerHTML = '<div class="no-data-msg">시각 피드백 검증 경로 정보가 없습니다.</div>';
                return;
            }

            routesData.forEach((r, idx) => {
                // Create Button Tab
                const btn = document.createElement("button");
                btn.className = "tab-btn" + (idx === 0 ? " active" : "");
                btn.textContent = `Route: ${r.route} (${r.pixel_difference_ratio}%)`;
                btn.onclick = () => activateSlide(idx);
                tabContainer.appendChild(btn);

                // Create Slide Deck
                const deck = document.createElement("div");
                deck.className = "image-deck";
                deck.id = `slide-${idx}`;
                deck.style.display = idx === 0 ? "grid" : "none";

                if (r.status === "SKIPPED") {
                    deck.innerHTML = `
                        <div class="no-data-msg" style="grid-column: span 3;">
                            이 경로의 픽셀 대조 검증이 건너뛰어졌습니다: <strong>${r.message}</strong>
                        </div>
                    `;
                } else {
                    deck.innerHTML = `
                        <div class="img-panel">
                            <div class="img-title">Base Design (Baseline)</div>
                            <div class="image-frame">
                                <img src="file://${r.baseline_image}" alt="Baseline" />
                            </div>
                        </div>
                        <div class="img-panel">
                            <div class="img-title">Current Implementation</div>
                            <div class="image-frame">
                                <img src="file://${r.current_image}" alt="Current" />
                            </div>
                        </div>
                        <div class="img-panel">
                            <div class="img-title">Visual Difference (Diff)</div>
                            <div class="image-frame">
                                <img src="file://${r.diff_image}" alt="Diff" />
                            </div>
                        </div>
                    `;
                }
                deckContainer.appendChild(deck);
            });
        }

        function activateSlide(index) {
            const tabs = document.querySelectorAll(".tab-btn");
            const decks = document.querySelectorAll(".image-deck");
            
            tabs.forEach((tab, i) => {
                tab.className = "tab-btn" + (i === index ? " active" : "");
            });

            decks.forEach((deck, i) => {
                deck.style.display = i === index ? "grid" : "none";
            });
        }

        window.onload = renderDashboard;
    </script>
</body>
</html>
