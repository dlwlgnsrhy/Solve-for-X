server:
  port: 8080

spring:
  application:
    name: legacy-core
  datasource:
    url: jdbc:h2:mem:legacy_core
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: a-very-secure-local-jwt-secret-key-that-needs-to-be-replaced-in-production

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
