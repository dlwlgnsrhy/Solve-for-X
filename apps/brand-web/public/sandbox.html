<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solve-for-X 로컬 브랜드 포털</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --card-bg: rgba(14, 14, 20, 0.85);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-color: #ededed;
            --text-muted: #888899;
            --primary: #00ff66;
            --primary-hover: #00f0ff;
            --cyan-glow: rgba(0, 240, 255, 0.15);
            --green-glow: rgba(0, 255, 102, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 0%, #0c1214 0%, #030305 100%);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Ambient Grid Matrix Pattern Overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Ambient Glow Spheres */
        .glow-ball-1 {
            position: absolute;
            top: 0%;
            left: 10%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 102, 0.08) 0%, transparent 70%);
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-ball-2 {
            position: absolute;
            bottom: 10%;
            right: 5%;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.06) 0%, transparent 70%);
            filter: blur(50px);
            pointer-events: none;
            z-index: 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2.5rem;
            background: rgba(3, 3, 5, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--card-border);
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #00ff66 0%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
            z-index: 2;
        }

        .sidebar {
            width: 340px;
            background: rgba(7, 7, 10, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            overflow-y: auto;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f0ff;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .apps-list {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 255, 102, 0.05) 0%, rgba(0, 240, 255, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .app-card:hover {
            border-color: #00ff66;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 102, 0.05);
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-card.active {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.03);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.08);
        }

        .app-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
            z-index: 2;
        }

        .app-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            font-family: monospace;
            z-index: 2;
        }

        .indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .viewport-container {
            flex: 1;
            background: #020204;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #020204;
        }

        .empty-state {
            text-align: center;
            max-width: 440px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
            background: rgba(14, 14, 20, 0.5);
            border: 1px dashed rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .empty-state-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 40%, #888899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-state-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(90deg, #00ff66 0%, #00f0ff 100%);
            color: #030305;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.25);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 255, 102, 0.4);
        }

        /* AI App Forge UI styling */
        .forge-form {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: rgba(14, 14, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-label {
            font-size: 0.72rem;
            color: #888899;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-select, .form-textarea {
            background: rgba(3, 3, 5, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #ededed;
            padding: 0.55rem;
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.15);
        }

        .btn-forge {
            background: linear-gradient(90deg, #00ff66 0%, #00f0ff 100%);
            color: #030305;
            border: none;
            padding: 0.65rem;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.2);
            text-align: center;
        }

        .btn-forge:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 255, 102, 0.35);
        }

        .btn-forge:disabled {
            background: #27272a;
            color: #71717a;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .forge-console {
            background: #020204;
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 8px;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            color: #a1a1aa;
            line-height: 1.4;
        }

        .console-line {
            margin-bottom: 0.3rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .text-cyan { color: #00f0ff; }
        .text-green { color: #00ff66; }
        .text-red { color: #ff3366; }
    </style>
</head>
<body>
    <div class="glow-ball-1"></div>
    <div class="glow-ball-2"></div>
    <header>
        <div class="logo-container">
            <span class="logo-text">SOLVE FOR X</span>
            <span class="subtitle">마이크로 브랜드 웹 포털</span>
        </div>
        <div id="active-app-title" class="subtitle" style="color: #00f0ff;">로드된 앱 없음</div>
    </header>
    <main>
        <div class="sidebar">
            <div style="display: flex; flex-direction: column; gap: 1.8rem;">
                <div>
                    <h3 class="section-title"><span>⚙️</span> 주조된 마이크로 앱 목록</h3>
                    <div id="apps-list" class="apps-list">
                        <!-- Dynamic rendering -->
                    </div>
                </div>
                
                <div>
                    <h3 class="section-title"><span>✨</span> AI 신규 앱 주조소 (Design Forge)</h3>
                    <div class="forge-form">
                        <div class="form-group">
                            <label class="form-label" for="forge-app-name">프로젝트 이름 (Project Name)</label>
                            <input type="text" id="forge-app-name" class="form-input" value="SafeSpace" placeholder="예: SafeSpace" />
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="forge-design-system">브랜드 비주얼 컬러 preset</label>
                            <select id="forge-design-system" class="form-select">
                                <option value="미니멀 모던 (Neutral Modern)">미니멀 모던 (Neutral Modern)</option>
                                <option value="포근한 파스텔 (Cozy Warm Pastel)" selected>포근한 파스텔 (Cozy Warm Pastel)</option>
                                <option value="네온 사이버펑크 (Cyberpunk Neon)">네온 사이버펑크 (Cyberpunk Neon)</option>
                                <option value="시크 다크 프로페셔널 (Sleek Dark Professional)">시크 다크 프로페셔널 (Sleek Dark Professional)</option>
                                <option value="에메랄드 가든 (Emerald Garden)">에메랄드 가든 (Emerald Garden)</option>
                                <option value="노을빛 선셋 (Sunset Glow)">노을빛 선셋 (Sunset Glow)</option>
                                <option value="클래식 로열 (Royal Velvet)">클래식 로열 (Royal Velvet)</option>
                                <option value="도쿄 나이트 (Tokyo Night)">도쿄 나이트 (Tokyo Night)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="forge-fidelity">디자인 정밀도 (Fidelity)</label>
                            <select id="forge-fidelity" class="form-select">
                                <option value="고정밀 디자인 (High fidelity)" selected>고정밀 디자인 (High fidelity)</option>
                                <option value="와이어프레임 (Wireframe)">와이어프레임 (Wireframe)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="forge-prompt">앱 요구사항 설명 프롬프트 (Prompt)</label>
                            <textarea id="forge-prompt" class="form-textarea" rows="4" placeholder="자연어로 만들고 싶은 앱의 기능을 묘사하세요.">A highly secure personal privacy lockbox app featuring an encrypted biometric vault, a private daily mindful journal with local-only storage, and real-time sentinel biometric lock logs.</textarea>
                        </div>
                        
                        <button id="forge-btn" class="btn-forge" onclick="launchForge()">AI 브랜드 프로토타입 주조 가동 🛰️</button>
                        
                        <div id="forge-console" class="forge-console"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="viewport-container">
            <div id="empty-state" class="empty-state">
                <div class="empty-state-title">브랜드 샌드박스 뷰포트</div>
                <div class="empty-state-desc">왼쪽 사이드바에서 주조 완료된 마이크로 앱을 선택하여 즉시 실시간 런타임 테스트를 진행하십시오.</div>
            </div>
            <iframe id="app-viewport"></iframe>
        </div>
    </main>

    <script>
        const appsListContainer = document.getElementById('apps-list');
        const viewport = document.getElementById('app-viewport');
        const emptyState = document.getElementById('empty-state');
        const activeAppTitle = document.getElementById('active-app-title');
        const forgeBtn = document.getElementById('forge-btn');
        const forgeConsole = document.getElementById('forge-console');

        async function loadRegistry() {
            try {
                const response = await fetch('assets/apps_registry.json');
                const apps = await response.json();
                renderApps(apps);
            } catch (error) {
                console.error('Failed to load apps registry:', error);
                appsListContainer.innerHTML = '<div class="app-meta">앱 레지스트리를 불러오는 데 실패했습니다.</div>';
            }
        }

        function renderApps(apps) {
            if (!apps || apps.length === 0) {
                appsListContainer.innerHTML = '<div class="app-meta">등록된 마이크로 앱이 없습니다. 아래 주조소에서 앱을 먼저 주조하십시오.</div>';
                return;
            }

            appsListContainer.innerHTML = '';
            apps.forEach(app => {
                const card = document.createElement('button');
                card.className = 'app-card';
                card.innerHTML = `
                    <div class="app-name">${app.app_name}</div>
                    <div class="app-meta">
                        <span class="indicator" style="background-color: ${app.design_system}"></span>
                        ID: ${app.app_id}
                    </div>
                `;
                card.addEventListener('click', () => selectApp(app, card));
                appsListContainer.appendChild(card);
            });
        }

        function selectApp(app, cardElement) {
            document.querySelectorAll('.app-card').forEach(c => c.classList.remove('active'));
            cardElement.classList.add('active');

            emptyState.style.display = 'none';
            viewport.style.display = 'block';
            viewport.src = app.path;
            activeAppTitle.textContent = `${app.app_name} (${app.app_id})`;
        }

        async function launchForge() {
            const appName = document.getElementById('forge-app-name').value.trim();
            const designSystem = document.getElementById('forge-design-system').value;
            const fidelity = document.getElementById('forge-fidelity').value;
            const prompt = document.getElementById('forge-prompt').value.trim();

            if (!appName || !prompt) {
                alert('앱 이름과 프롬프트를 모두 입력해 주세요!');
                return;
            }

            forgeBtn.disabled = true;
            forgeBtn.innerText = '⚙️ AI 주조 엔진 가동 중...';
            forgeConsole.style.display = 'block';
            forgeConsole.innerHTML = '<div class="console-line text-cyan">> 🚀 [SRE GATEWAY]: Dispatching AI build request to local agent bridge...</div>';

            try {
                // Determine API host
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const apiHost = isLocal ? '' : 'http://localhost:3000'; // Bridges static page to local Next.js dev server

                const response = await fetch(`${apiHost}/api/sre/forge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ appName, designSystem, fidelity, prompt })
                });

                const data = await response.json();
                
                if (response.ok && data.status === 'SUCCESS') {
                    forgeConsole.innerHTML = '<div class="console-line text-green">> 🎉 [SUCCESS]: AI Micro-App Forged and Published Successfully!</div>';
                    if (data.logs) {
                        data.logs.forEach(log => {
                            const line = document.createElement('div');
                            line.className = 'console-line';
                            line.innerText = log;
                            forgeConsole.appendChild(line);
                        });
                    }
                    // Auto scroll console to bottom
                    forgeConsole.scrollTop = forgeConsole.scrollHeight;
                    // Refresh registry immediately
                    loadRegistry();
                } else {
                    forgeConsole.innerHTML += `<div class="console-line text-red">> ❌ [ERROR]: Synthesis Failed. ${data.error || 'Unknown Exception'}</div>`;
                    if (data.logs) {
                        data.logs.forEach(log => {
                            const line = document.createElement('div');
                            line.className = 'console-line';
                            line.innerText = log;
                            forgeConsole.appendChild(line);
                        });
                    }
                    forgeConsole.scrollTop = forgeConsole.scrollHeight;
                }
            } catch (err) {
                forgeConsole.innerHTML += `<div class="console-line text-red">> ❌ [BRIDGE OFFLINE]: Local Next.js dev server is offline.\n> Please run 'npm run dev' locally to enable the SRE compiler!</div>`;
                forgeConsole.scrollTop = forgeConsole.scrollHeight;
            } finally {
                forgeBtn.disabled = false;
                forgeBtn.innerText = 'AI 브랜드 프로토타입 주조 가동 🛰️';
            }
        }

        // Init load
        loadRegistry();
        
        // Auto refresh every 5 seconds to catch new builds
        setInterval(loadRegistry, 5000);
    </script>
</body>
</html>
