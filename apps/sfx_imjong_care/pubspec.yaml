name: sfx_imjong_care
description: "SFX Imjong Care - Trendy positive will digital card for MZ generation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  flutter_animate: ^4.5.0
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  path_provider: ^2.1.4
  shared_preferences: ^2.5.3
  in_app_review: ^2.0.9
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#0A0A0F"
  color_dark: "#0A0A0F"
  image: "assets/images/splash_logo.png"
  image_dark: "assets/images/splash_logo.png"
  android_12:
    color: "#0A0A0F"
    image: "assets/images/splash_logo.png"
