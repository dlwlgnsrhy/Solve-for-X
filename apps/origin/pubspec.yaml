name: origin
description: "Origin - Human Authenticity Protocol. Record the process of thought."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  
  # Database & Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.4
  path: ^1.8.3
  sqlite3: ^2.4.0
  crypto: ^3.0.3
  
  # Encryption
  encrypt: ^5.0.3
  
  # Preferences
  shared_preferences: ^2.3.3
  
  # Export & Sharing
  share_plus: ^10.1.3
  pdf: ^3.10.8
  
  # Animation
  flutter_animate: ^4.5.0
  
  # App review
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#0A0A0F"
  color_dark: "#0A0A0F"
  image: "assets/images/splash_logo.png"
  image_dark: "assets/images/splash_logo.png"
  android_12:
    color: "#0A0A0F"
    image: "assets/images/splash_logo.png"
