version: '3.8'

services:
  # 1. PostgreSQL - Unified Multi-tenant Relational Database for all SFX Apps & Moon_Whisper
  postgres:
    image: postgres:15-alpine
    container_name: sfx-basecamp-postgres
    restart: always
    environment:
      POSTGRES_DB: sfx_basecamp
      POSTGRES_USER: ${POSTGRES_USER:-sfx_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sfx_secure_pass_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - sfx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sfx_admin} -d sfx_basecamp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis - In-memory Caching & Real-time Live Metric Telemetry Queue
  redis:
    image: redis:7-alpine
    container_name: sfx-basecamp-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-sfx_redis_pass_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sfx-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sfx_redis_pass_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Next.js Brand Portal (brand-web) - Self-hosted Containerized Console
  brand-web:
    image: node:18-alpine
    container_name: sfx-brand-web
    restart: always
    working_dir: /app
    volumes:
      - ../apps/brand-web:/app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sfx_admin}:${POSTGRES_PASSWORD:-sfx_secure_pass_2026}@postgres:5432/sfx_basecamp?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sfx_redis_pass_2026}@redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sfx-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sfx-network:
    driver: bridge
