<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solve-for-X 로컬 브랜드 포털</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --card-bg: rgba(14, 14, 20, 0.85);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-color: #ededed;
            --text-muted: #888899;
            --primary: #00ff66;
            --primary-hover: #00f0ff;
            --cyan-glow: rgba(0, 240, 255, 0.15);
            --green-glow: rgba(0, 255, 102, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 0%, #0c1214 0%, #030305 100%);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Ambient Grid Matrix Pattern Overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Ambient Glow Spheres */
        .glow-ball-1 {
            position: absolute;
            top: 0%;
            left: 10%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 102, 0.08) 0%, transparent 70%);
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-ball-2 {
            position: absolute;
            bottom: 10%;
            right: 5%;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.06) 0%, transparent 70%);
            filter: blur(50px);
            pointer-events: none;
            z-index: 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2.5rem;
            background: rgba(3, 3, 5, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--card-border);
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #00ff66 0%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
            z-index: 2;
        }

        .sidebar {
            width: 340px;
            background: rgba(7, 7, 10, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            overflow-y: auto;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f0ff;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .apps-list {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 255, 102, 0.05) 0%, rgba(0, 240, 255, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .app-card:hover {
            border-color: #00ff66;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 102, 0.05);
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-card.active {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.03);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.08);
        }

        .app-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
            z-index: 2;
        }

        .app-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            font-family: monospace;
            z-index: 2;
        }

        .indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .viewport-container {
            flex: 1;
            background: #020204;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #020204;
        }

        .empty-state {
            text-align: center;
            max-width: 440px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
            background: rgba(14, 14, 20, 0.5);
            border: 1px dashed rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .empty-state-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 40%, #888899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-state-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(90deg, #00ff66 0%, #00f0ff 100%);
            color: #030305;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.25);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 255, 102, 0.4);
        }
    </style>
</head>
<body>
    <div class="glow-ball-1"></div>
    <div class="glow-ball-2"></div>
    <header>
        <div class="logo-container">
            <span class="logo-text">SOLVE FOR X</span>
            <span class="subtitle">마이크로 브랜드 웹 포털</span>
        </div>
        <div id="active-app-title" class="subtitle" style="color: #00f0ff;">로드된 앱 없음</div>
    </header>
    <main>
        <div class="sidebar">
            <div>
                <h3 class="section-title"><span>⚙️</span> 주조된 마이크로 앱 목록</h3>
                <div id="apps-list" class="apps-list">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </div>
        <div class="viewport-container">
            <div id="empty-state" class="empty-state">
                <div class="empty-state-title">브랜드 샌드박스 뷰포트</div>
                <div class="empty-state-desc">왼쪽 사이드바에서 주조 완료된 마이크로 앱을 선택하여 즉시 실시간 런타임 테스트를 진행하십시오.</div>
            </div>
            <iframe id="app-viewport"></iframe>
        </div>
    </main>

    <script>
        const appsListContainer = document.getElementById('apps-list');
        const viewport = document.getElementById('app-viewport');
        const emptyState = document.getElementById('empty-state');
        const activeAppTitle = document.getElementById('active-app-title');

        async function loadRegistry() {
            try {
                const response = await fetch('assets/apps_registry.json');
                const apps = await response.json();
                renderApps(apps);
            } catch (error) {
                console.error('Failed to load apps registry:', error);
                appsListContainer.innerHTML = '<div class="app-meta">앱 레지스트리를 불러오는 데 실패했습니다.</div>';
            }
        }

        function renderApps(apps) {
            if (!apps || apps.length === 0) {
                appsListContainer.innerHTML = '<div class="app-meta">등록된 마이크로 앱이 없습니다. 대시보드에서 앱을 먼저 주조하십시오.</div>';
                return;
            }

            appsListContainer.innerHTML = '';
            apps.forEach(app => {
                const card = document.createElement('button');
                card.className = 'app-card';
                card.innerHTML = `
                    <div class="app-name">${app.app_name}</div>
                    <div class="app-meta">
                        <span class="indicator" style="background-color: ${app.design_system}"></span>
                        ID: ${app.app_id}
                    </div>
                `;
                card.addEventListener('click', () => selectApp(app, card));
                appsListContainer.appendChild(card);
            });
        }

        function selectApp(app, cardElement) {
            document.querySelectorAll('.app-card').forEach(c => c.classList.remove('active'));
            cardElement.classList.add('active');

            emptyState.style.display = 'none';
            viewport.style.display = 'block';
            viewport.src = app.path;
            activeAppTitle.textContent = `${app.app_name} (${app.app_id})`;
        }

        // Init load
        loadRegistry();
        
        // Auto refresh every 5 seconds to catch new builds
        setInterval(loadRegistry, 5000);
    </script>
</body>
</html>
