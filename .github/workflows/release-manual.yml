name: Release - Manual Build All Platforms

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: false
        default: "production"
        type: choice
        options:
          - staging
          - production
      tag:
        description: "Release tag (optional)"
        required: false
        type: string

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      build-path: ${{ steps.build.outputs.build-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Install Ruby Dependencies
        run: |
          cd apps/legacy_vault
          bundle install

      - name: Privacy Audit
        run: |
          cd apps/legacy_vault
          bash PrivacyAudit.sh

      - name: Build with Fastlane
        run: |
          cd apps/legacy_vault
          bundle exec fastlane build
        env:
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/legacy_vault/build/
          retention-days: 7

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build-path: ${{ steps.build.outputs.build-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Decode Keystore
        run: |
          cd apps/legacy_vault
          echo $ANDROID_KEYSTORE_B64 | base64 -d > app/keystore.jks
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build AAB
        run: |
          cd apps/legacy_vault
          ./gradlew bundleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: apps/legacy_vault/app/build/outputs/bundle/
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/legacy_vault_web/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd apps/legacy_vault_web
          pnpm install --frozen-lockfile

      - name: Build
        run: |
          cd apps/legacy_vault_web
          pnpm build

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/legacy_vault_web/out/
          retention-days: 7
