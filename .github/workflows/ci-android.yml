name: CI - Android (legacy_vault)

on:
  push:
    branches: ["main", "develop", "release/v*"]
    paths:
      - "apps/legacy_vault/**"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/legacy_vault/**"

env:
  # ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  # GOOGLE_PLAY_KEY_BASE64: ${{ secrets.GOOGLE_PLAY_KEY_BASE64 }}
  # SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    if: github.event_name == 'pull_request'
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run lint
        run: |
          cd apps/legacy_vault
          ./gradlew lint

      - name: Run tests
        run: |
          cd apps/legacy_vault
          ./gradlew test

      - name: Run debug lint check
        run: |
          cd apps/legacy_vault
          ./gradlew lintDebug

  build-and-release:
    if: github.event_name == 'push'
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Decode Keystore
        run: |
          cd apps/legacy_vault
          echo $ANDROID_KEYSTORE_B64 | base64 -d > app/keystore.jks
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build AAB
        run: |
          cd apps/legacy_vault
          ./gradlew bundleRelease

      - name: Upload to Google Play
        run: |
          cd apps/legacy_vault
          bundle exec fastlane upload_playstore
        env:
          GOOGLE_PLAY_KEY_BASE64: ${{ secrets.GOOGLE_PLAY_KEY_BASE64 }}
