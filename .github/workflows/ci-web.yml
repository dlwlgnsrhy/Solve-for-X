name: CI - Web (legacy_vault_web)

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "apps/legacy_vault_web/**"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/legacy_vault_web/**"

env:
  # VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  # VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  # VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name == 'pull_request'
    name: Check (Lint & Test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/legacy_vault_web/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd apps/legacy_vault_web
          pnpm install --frozen-lockfile

      - name: Run lint
        run: |
          cd apps/legacy_vault_web
          pnpm lint

      - name: Run tests
        run: |
          cd apps/legacy_vault_web
          pnpm test

  deploy:
    if: github.event_name == 'push'
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    environment:
      name: production
      url: ${{ steps.deploy.outputs.staging-url || steps.deploy.outputs.production-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/legacy_vault_web/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd apps/legacy_vault_web
          pnpm install --frozen-lockfile

      - name: Build
        run: |
          cd apps/legacy_vault_web
          pnpm build

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel_args: "--prod"
          working_directory: apps/legacy_vault_web
