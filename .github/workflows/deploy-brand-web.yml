name: Deploy Next.js Brand Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true # GitHub Pages 배포 플래그 설정
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/brand-web/package-lock.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Install dependencies
        run: |
          cd apps/brand-web
          npm ci
          
      - name: FORCE CLEAR CACHE
        run: |
          cd apps/brand-web
          rm -rf .next out _site # 이전 빌드 잔재 완전 제거
          
      - name: Patch API route for static export
        run: |
          cd apps/brand-web
          sed -i "s/\/\/ export const dynamic = 'force-static';/export const dynamic = 'force-static';/" src/app/api/sre/health/route.ts
          echo ">>> API ROUTE PATCHED:"
          head -n 10 src/app/api/sre/health/route.ts

      - name: Build with Next.js (Safe Mode)
        run: |
          cd apps/brand-web
          npx next build
        
      - name: Verify and Prepare Artifacts
        run: |
          echo ">>> Locating and moving build results..."
          mkdir -p _site
          if [ -d "apps/brand-web/out" ]; then
            cp -r apps/brand-web/out/* _site/
            echo "Success: Moved results from apps/brand-web/out to root _site"
          elif [ -d "apps/brand-web/.next/out" ]; then
            cp -r apps/brand-web/.next/out/* _site/
            echo "Redirect: Moved results from apps/brand-web/.next/out to root _site"
          else
            echo "Searching for index.html as a fallback..."
            INDEX_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" | head -n 1)
            if [ ! -z "$INDEX_PATH" ]; then
              BUILD_DIR=$(dirname "$INDEX_PATH")
              cp -r "$BUILD_DIR"/* _site/
              echo "Fallback: Found index.html in $BUILD_DIR. Moved content to _site"
            else
              echo "FATAL: Could not find build results anywhere."
              exit 1
            fi
          fi
          
          # 최종 파일 구조 확인
          echo ">>> Final Artifact Structure in root _site:"
          ls -R _site | head -n 50

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
