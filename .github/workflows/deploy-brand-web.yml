name: Deploy Next.js Brand Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_OUTPUT: export
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/brand-web/package-lock.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Install dependencies
        run: |
          cd apps/brand-web
          npm ci
          
      - name: Cleanup build artifacts
        run: |
          cd apps/brand-web
          rm -rf .next out
          
      - name: Patch API route for static export
        run: |
          cd apps/brand-web
          sed -i "s/\/\/ export const dynamic = 'force-static';/export const dynamic = 'force-static';/" src/app/api/sre/health/route.ts
          echo "Checking patched file content..."
          cat src/app/api/sre/health/route.ts | head -n 10

      - name: Build with Next.js
        run: |
          cd apps/brand-web
          npm run build
        
      - name: Verify build output
        run: |
          echo "Listing 'out' directory content..."
          if [ -d "apps/brand-web/out" ]; then
            ls -R apps/brand-web/out
          else
            echo "Error: 'out' directory not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/brand-web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
