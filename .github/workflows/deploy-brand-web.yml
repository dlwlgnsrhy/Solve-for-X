name: Deploy Next.js Brand Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_OUTPUT: export
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/brand-web/package-lock.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Install dependencies
        run: |
          cd apps/brand-web
          npm ci
          
      - name: Cleanup build artifacts
        run: |
          cd apps/brand-web
          rm -rf .next out
          
      - name: Patch API route for static export
        run: |
          cd apps/brand-web
          sed -i "s/\/\/ export const dynamic = 'force-static';/export const dynamic = 'force-static';/" src/app/api/sre/health/route.ts
          echo ">>> API ROUTE PATCHED:"
          head -n 10 src/app/api/sre/health/route.ts

      - name: Build with Next.js (Force Environment)
        run: |
          cd apps/brand-web
          echo ">>> CURRENT ENV NEXT_OUTPUT: $NEXT_OUTPUT"
          npx next build
        
      - name: "[DIAGNOSTIC] Locate Build Outputs"
        run: |
          echo ">>> DIAGNOSTIC: Searching for build artifacts..."
          echo "1. Checking apps/brand-web/out:"
          ls -la apps/brand-web/out || echo "apps/brand-web/out NOT FOUND"
          
          echo "2. Checking apps/brand-web/.next/out:"
          ls -la apps/brand-web/.next/out || echo "apps/brand-web/.next/out NOT FOUND"
          
          echo "3. Searching for index.html in the entire repository..."
          find . -name "index.html" -not -path "*/node_modules/*"
          
          echo "4. Searching for any directory named 'out'..."
          find . -name "out" -type d -not -path "*/node_modules/*"

      - name: Verify build output and Prepare
        run: |
          if [ -d "apps/brand-web/out" ]; then
            echo "Success: out directory found at expected location."
          elif [ -d "apps/brand-web/.next/out" ]; then
            echo "Redirect: out directory found in .next. Moving to expected location..."
            mv apps/brand-web/.next/out apps/brand-web/out
          else
            echo "FATAL: Could not locate build output even in diagnostic mode."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/brand-web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
